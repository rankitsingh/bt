<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="system-ui,-apple-system,sans-serif">
  <!-- Background -->
  <rect width="900" height="560" fill="#F7F8FC" rx="16"/>

  <!-- Sidebar -->
  <rect x="0" y="0" width="200" height="560" fill="#0D1B3E" rx="16"/>
  <rect x="186" y="0" width="14" height="560" fill="#0D1B3E"/>

  <!-- Sidebar logo -->
  <rect x="20" y="20" width="32" height="32" rx="8" fill="#F59E0B"/>
  <text x="36" y="41" fill="white" font-size="14" font-weight="800" text-anchor="middle">BT</text>
  <text x="68" y="35" fill="white" font-size="12" font-weight="700">Bharat</text>
  <text x="68" y="48" fill="#F59E0B" font-size="12" font-weight="700">Tender</text>

  <!-- Sidebar nav items -->
  <rect x="12" y="76" width="176" height="36" rx="8" fill="#F59E0B" opacity="0.15"/>
  <rect x="24" y="88" width="12" height="12" rx="3" fill="#F59E0B"/>
  <text x="44" y="99" fill="#F59E0B" font-size="12" font-weight="700">Dashboard</text>

  <rect x="24" y="132" width="12" height="12" rx="3" fill="white" opacity="0.4"/>
  <text x="44" y="143" fill="white" font-size="12" opacity="0.6">My Tenders</text>

  <rect x="24" y="164" width="12" height="12" rx="3" fill="white" opacity="0.4"/>
  <text x="44" y="175" fill="white" font-size="12" opacity="0.6">Vendors</text>

  <rect x="24" y="196" width="12" height="12" rx="3" fill="white" opacity="0.4"/>
  <text x="44" y="207" fill="white" font-size="12" opacity="0.6">Contracts</text>

  <rect x="24" y="228" width="12" height="12" rx="3" fill="white" opacity="0.4"/>
  <text x="44" y="239" fill="white" font-size="12" opacity="0.6">Payments</text>

  <!-- Main content area -->
  <!-- Top bar -->
  <rect x="216" y="16" width="668" height="48" rx="10" fill="white"/>
  <text x="236" y="46" fill="#0D1B3E" font-size="16" font-weight="800">Post a New Tender</text>
  <rect x="756" y="24" width="116" height="32" rx="8" fill="#F59E0B"/>
  <text x="814" y="44" fill="white" font-size="12" font-weight="700" text-anchor="middle">+ Post Tender</text>

  <!-- Step indicator -->
  <rect x="216" y="80" width="668" height="44" rx="10" fill="white"/>
  <!-- Step 1 active -->
  <circle cx="270" cy="102" r="14" fill="#0D1B3E"/>
  <text x="270" y="107" fill="white" font-size="11" font-weight="700" text-anchor="middle">1</text>
  <text x="292" y="107" fill="#0D1B3E" font-size="12" font-weight="700">Tender Details</text>
  <!-- connector -->
  <rect x="370" y="101" width="60" height="2" rx="1" fill="#E8EAF0"/>
  <!-- Step 2 -->
  <circle cx="448" cy="102" r="14" fill="#E8EAF0"/>
  <text x="448" y="107" fill="#9CA3AF" font-size="11" font-weight="700" text-anchor="middle">2</text>
  <text x="470" y="107" fill="#9CA3AF" font-size="12">Specifications</text>
  <!-- connector -->
  <rect x="548" y="101" width="60" height="2" rx="1" fill="#E8EAF0"/>
  <!-- Step 3 -->
  <circle cx="626" cy="102" r="14" fill="#E8EAF0"/>
  <text x="626" y="107" fill="#9CA3AF" font-size="11" font-weight="700" text-anchor="middle">3</text>
  <text x="648" y="107" fill="#9CA3AF" font-size="12">Review &amp; Post</text>

  <!-- Form card -->
  <rect x="216" y="136" width="430" height="320" rx="12" fill="white"/>

  <!-- Tender Title field -->
  <text x="236" y="168" fill="#374151" font-size="11" font-weight="600">Tender Title *</text>
  <rect x="236" y="174" width="390" height="38" rx="8" fill="#F9FAFB" stroke="#0D1B3E" stroke-width="2"/>
  <text x="252" y="198" fill="#0D1B3E" font-size="12">Steel Coils — Q2 2026 Supply Requirement</text>

  <!-- Category + Location row -->
  <text x="236" y="232" fill="#374151" font-size="11" font-weight="600">Category *</text>
  <rect x="236" y="238" width="185" height="38" rx="8" fill="#F9FAFB" stroke="#E8EAF0" stroke-width="1.5"/>
  <text x="252" y="262" fill="#6B7280" font-size="12">Raw Materials &amp; Metals</text>
  <text x="436" y="232" fill="#374151" font-size="11" font-weight="600">Delivery City *</text>
  <rect x="436" y="238" width="190" height="38" rx="8" fill="#F9FAFB" stroke="#E8EAF0" stroke-width="1.5"/>
  <text x="452" y="262" fill="#6B7280" font-size="12">Mumbai, Maharashtra</text>

  <!-- Quantity + Budget -->
  <text x="236" y="298" fill="#374151" font-size="11" font-weight="600">Quantity Required *</text>
  <rect x="236" y="304" width="185" height="38" rx="8" fill="#F9FAFB" stroke="#E8EAF0" stroke-width="1.5"/>
  <text x="252" y="328" fill="#6B7280" font-size="12">50 Metric Tonnes</text>
  <text x="436" y="298" fill="#374151" font-size="11" font-weight="600">Budget Range *</text>
  <rect x="436" y="304" width="190" height="38" rx="8" fill="#F9FAFB" stroke="#E8EAF0" stroke-width="1.5"/>
  <text x="452" y="328" fill="#6B7280" font-size="12">₹15L – ₹20L</text>

  <!-- Deadline -->
  <text x="236" y="364" fill="#374151" font-size="11" font-weight="600">Bid Deadline *</text>
  <rect x="236" y="370" width="185" height="38" rx="8" fill="#F9FAFB" stroke="#E8EAF0" stroke-width="1.5"/>
  <text x="252" y="394" fill="#6B7280" font-size="12">15 April 2026</text>
  <text x="436" y="364" fill="#374151" font-size="11" font-weight="600">Expected Delivery</text>
  <rect x="436" y="370" width="190" height="38" rx="8" fill="#F9FAFB" stroke="#E8EAF0" stroke-width="1.5"/>
  <text x="452" y="394" fill="#6B7280" font-size="12">30 April 2026</text>

  <!-- Action buttons -->
  <rect x="236" y="422" width="185" height="16" rx="4" fill="#E8EAF0"/>
  <rect x="497" y="418" width="129" height="36" rx="8" fill="#0D1B3E"/>
  <text x="561" y="441" fill="white" font-size="12" font-weight="700" text-anchor="middle">Next Step →</text>

  <!-- Right panel - AI Matching preview -->
  <rect x="658" y="136" width="226" height="320" rx="12" fill="white"/>
  <text x="678" y="164" fill="#0D1B3E" font-size="13" font-weight="800">AI Vendor Match</text>
  <rect x="678" y="170" width="50" height="4" rx="2" fill="#F59E0B"/>

  <text x="678" y="196" fill="#6B7280" font-size="10">Based on your tender, we found</text>
  <text x="678" y="210" fill="#0D1B3E" font-size="22" font-weight="800">24</text>
  <text x="706" y="210" fill="#6B7280" font-size="10" dy="-4"> verified vendors</text>

  <!-- Vendor match cards -->
  <rect x="678" y="218" width="186" height="52" rx="8" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1"/>
  <circle cx="698" cy="244" r="14" fill="#0D1B3E"/>
  <text x="698" y="249" fill="white" font-size="9" font-weight="700" text-anchor="middle">SM</text>
  <text x="720" y="238" fill="#0D1B3E" font-size="11" font-weight="700">Steel Master Co.</text>
  <text x="720" y="252" fill="#059669" font-size="9">✓ GST Verified · ⭐ 4.8</text>
  <rect x="820" y="232" width="36" height="20" rx="4" fill="#059669"/>
  <text x="838" y="246" fill="white" font-size="9" font-weight="700" text-anchor="middle">Top</text>

  <rect x="678" y="278" width="186" height="52" rx="8" fill="#F9FAFB" stroke="#E8EAF0" stroke-width="1"/>
  <circle cx="698" cy="304" r="14" fill="#1D4ED8"/>
  <text x="698" y="309" fill="white" font-size="9" font-weight="700" text-anchor="middle">MI</text>
  <text x="720" y="298" fill="#0D1B3E" font-size="11" font-weight="700">Mumbai Iron Works</text>
  <text x="720" y="312" fill="#059669" font-size="9">✓ GST Verified · ⭐ 4.6</text>

  <rect x="678" y="338" width="186" height="52" rx="8" fill="#F9FAFB" stroke="#E8EAF0" stroke-width="1"/>
  <circle cx="698" cy="364" r="14" fill="#7C3AED"/>
  <text x="698" y="369" fill="white" font-size="9" font-weight="700" text-anchor="middle">PS</text>
  <text x="720" y="358" fill="#0D1B3E" font-size="11" font-weight="700">Pune Steel Traders</text>
  <text x="720" y="372" fill="#059669" font-size="9">✓ Udyam Verified · ⭐ 4.5</text>

  <rect x="678" y="400" width="186" height="36" rx="8" fill="#0D1B3E"/>
  <text x="771" y="422" fill="white" font-size="11" font-weight="700" text-anchor="middle">View All 24 Vendors</text>

  <!-- Bottom status bar -->
  <rect x="216" y="468" width="668" height="72" rx="12" fill="white"/>
  <rect x="228" y="480" width="140" height="48" rx="8" fill="#EFF6FF"/>
  <text x="298" y="500" fill="#1D4ED8" font-size="18" font-weight="800" text-anchor="middle">3</text>
  <text x="298" y="516" fill="#1D4ED8" font-size="9" text-anchor="middle">Tenders Active</text>

  <rect x="380" y="480" width="140" height="48" rx="8" fill="#F0FDF4"/>
  <text x="450" y="500" fill="#059669" font-size="18" font-weight="800" text-anchor="middle">24</text>
  <text x="450" y="516" fill="#059669" font-size="9" text-anchor="middle">Vendors Matched</text>

  <rect x="532" y="480" width="140" height="48" rx="8" fill="#FEF3C7"/>
  <text x="602" y="500" fill="#D97706" font-size="18" font-weight="800" text-anchor="middle">48h</text>
  <text x="602" y="516" fill="#D97706" font-size="9" text-anchor="middle">Avg Time to Bids</text>

  <rect x="684" y="480" width="188" height="48" rx="8" fill="#0D1B3E"/>
  <text x="778" y="508" fill="#F59E0B" font-size="12" font-weight="700" text-anchor="middle">✓ Escrow Protected</text>
</svg>
